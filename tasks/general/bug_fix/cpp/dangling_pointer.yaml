tags: [bugs, memory, vectors]

buggy_code: |
  std::string prepend_and_get_original_first(std::vector<std::string>& v, const std::string& item) {
      const std::string* first = &v[0];
      v.insert(v.begin(), item);
      return *first;
  }

prompt: |
  The following code has undefined behavior: it stores a pointer into a vector
  and then mutates the vector, potentially invalidating the pointer.

  Fix it and return only the corrected function.

  Expected behavior:
  - Return the original first element before prepend
  - If the vector is empty, return an empty string
  - Prepend `item` to the vector

  ```cpp
  std::string prepend_and_get_original_first(std::vector<std::string>& v, const std::string& item) {
      const std::string* first = &v[0];
      v.insert(v.begin(), item);
      return *first;
  }
  ```

test_harness: |
  #include <vector>
  #include <string>
  #include <iostream>
  #include <cassert>
  using namespace std;

  {{GENERATED_CODE}}

  int main() {
      vector<string> v1 = {"hello", "world"};
      string result1 = prepend_and_get_original_first(v1, "new");
      assert(result1 == "hello");
      assert(v1.size() == 3);
      assert(v1[0] == "new");
      assert(v1[1] == "hello");

      vector<string> v2;
      string result2 = prepend_and_get_original_first(v2, "first");
      assert(result2 == "");
      assert(v2.size() == 1);
      assert(v2[0] == "first");

      vector<string> v3;
      v3.reserve(1);
      v3.push_back("a");
      v3.push_back("b");
      string result3 = prepend_and_get_original_first(v3, "z");
      assert(result3 == "a");
      assert(v3[0] == "z");

      cout << "PASS" << endl;
      return 0;
  }

