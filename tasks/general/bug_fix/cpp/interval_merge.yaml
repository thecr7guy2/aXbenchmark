buggy_code: |
  std::vector<std::pair<int, int>> merge_intervals(std::vector<std::pair<int, int>> intervals) {
      if (intervals.empty()) return {};
      std::sort(intervals.begin(), intervals.end());
      std::vector<std::pair<int, int>> merged;
      merged.push_back(intervals[0]);
      for (size_t i = 1; i < intervals.size(); ++i) {
          auto& current = intervals[i];
          auto& last = merged.back();
          if (current.first <= last.second) {
              last.second = current.second;
          } else {
              merged.push_back(current);
          }
      }
      return merged;
  }

prompt: |
  The following interval merge implementation is buggy. Fix it and return only the corrected function.

  Requirements:
  - Merge overlapping intervals
  - Treat touching intervals (e.g. `[1,3]` and `[3,5]`) as mergeable
  - Keep output sorted by start

  ```cpp
  std::vector<std::pair<int, int>> merge_intervals(std::vector<std::pair<int, int>> intervals) {
      if (intervals.empty()) return {};
      std::sort(intervals.begin(), intervals.end());
      std::vector<std::pair<int, int>> merged;
      merged.push_back(intervals[0]);
      for (size_t i = 1; i < intervals.size(); ++i) {
          auto& current = intervals[i];
          auto& last = merged.back();
          if (current.first <= last.second) {
              last.second = current.second;
          } else {
              merged.push_back(current);
          }
      }
      return merged;
  }
  ```

