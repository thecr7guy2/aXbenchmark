id: python_bug_broken_generator
evaluator: bug_fix
language: python
difficulty: hard
source: general
tags: [bugs, generators, iterators]

buggy_code: |
  def running_average():
      total = 0
      count = 0
      while True:
          value = yield total / count
          total += value
          count += 1

prompt: |
  The following generator is supposed to yield a running average for streamed values.
  It has multiple bugs. Fix it and return only the corrected function.

  Expected behavior:
  - The first `next(gen)` should yield `0.0`
  - Each subsequent `send(x)` yields the updated average after including `x`
  - It should handle ints and floats

  ```python
  def running_average():
      total = 0
      count = 0
      while True:
          value = yield total / count
          total += value
          count += 1
  ```

test_cases:
  - input: |
      gen = running_average()
      result = [
          round(next(gen), 6),
          round(gen.send(10), 6),
          round(gen.send(20), 6),
          round(gen.send(-10), 6),
      ]
      result
    expected:
      - 0.0
      - 10.0
      - 15.0
      - 6.666667
  - input: |
      gen = running_average()
      next(gen)
      gen.send(2.5)
      result = round(gen.send(7.5), 6)
      result
    expected: 5.0
  - input: |
      gen = running_average()
      next(gen)
      gen.send(1)
      gen.send(2)
      gen.send(3)
      result = round(gen.send(4), 6)
      result
    expected: 2.5

timeout_seconds: 15
