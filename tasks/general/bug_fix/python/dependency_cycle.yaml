  - input: |
      graph = {
          "A": ["B"],
          "B": ["C"],
          "C": ["A"],
      }
      try:
          resolve_dependencies(graph)
          result = "ok"
      except ValueError as exc:
          result = str(exc)
      result
    expected: cycle
