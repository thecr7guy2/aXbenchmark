buggy_code: |
  class LRUCache:
      def __init__(self, capacity):
          self.capacity = capacity
          self.items = {}
          self.order = []

      def get(self, key):
          if key not in self.items:
              return -1
          return self.items[key]

      def put(self, key, value):
          if key in self.items:
              self.items[key] = value
              return
          if len(self.items) >= self.capacity:
              oldest = self.order.pop(0)
              del self.items[oldest]
          self.items[key] = value
          self.order.append(key)

prompt: |
  The LRU cache implementation below has multiple logic bugs.

  Expected behavior:
  - `get()` updates recency for existing keys
  - `put()` on an existing key updates value and recency
  - At capacity, eviction removes the least-recently-used key
  - Capacity is always positive in tests

  Fix it and return only the corrected class.

  ```python
  class LRUCache:
      def __init__(self, capacity):
          self.capacity = capacity
          self.items = {}
          self.order = []

      def get(self, key):
          if key not in self.items:
              return -1
          return self.items[key]

      def put(self, key, value):
          if key in self.items:
              self.items[key] = value
              return
          if len(self.items) >= self.capacity:
              oldest = self.order.pop(0)
              del self.items[oldest]
          self.items[key] = value
          self.order.append(key)
  ```

