id: bash_docker_health
evaluator: code_gen
language: bash
difficulty: medium
source: general
tags: [bash, docker, monitoring]

prompt: |
  Write a bash script that checks if a Docker container named `vllm_qwen` is running.
  - If it's running: print "HEALTHY: vllm_qwen is running"
  - If it's stopped or not found: print "UNHEALTHY: vllm_qwen is not running" and exit with code 1

test_cases:
  - input: |
      mkdir -p bin
      cat > bin/docker <<'EOF'
      #!/bin/bash
      if [ "$1" = "ps" ]; then
          echo "vllm_qwen"
      fi
      EOF
      chmod +x bin/docker
      export PATH="$PWD/bin:$PATH"
    expected: "HEALTHY: vllm_qwen is running\n"
    expected_exit_code: 0
  - input: |
      mkdir -p bin
      cat > bin/docker <<'EOF'
      #!/bin/bash
      if [ "$1" = "ps" ]; then
          echo "other_container"
      fi
      EOF
      chmod +x bin/docker
      export PATH="$PWD/bin:$PATH"
    expected: "UNHEALTHY: vllm_qwen is not running\n"
    expected_exit_code: 1

timeout_seconds: 10
