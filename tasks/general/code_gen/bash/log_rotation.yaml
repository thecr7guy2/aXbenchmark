id: bash_log_rotation
evaluator: code_gen
language: bash
difficulty: easy
source: general
tags: [bash, logging, files]

prompt: |
  Write a bash script that rotates log files in a directory called `logs/`.
  It should:
  1. Compress any .log files older than 7 days using gzip
  2. Delete any .log.gz files older than 30 days
  The script should work correctly even if there are no matching files.

test_cases:
  - input: |
      mkdir -p logs
    post_check: |
      test -d logs && echo "OK_EMPTY"
    expected: "OK_EMPTY\n"
    expected_exit_code: 0
  - input: |
      mkdir -p logs
      printf 'old log\n' > logs/app.log
      printf 'stale archive\n' > logs/old.log.gz
      touch -d '8 days ago' logs/app.log
      touch -d '31 days ago' logs/old.log.gz
    post_check: |
      test -f logs/app.log.gz && \
      test ! -f logs/app.log && \
      test ! -f logs/old.log.gz && \
      echo "OK_ROTATED"
    expected: "OK_ROTATED\n"
    expected_exit_code: 0

timeout_seconds: 10
