id: cpp_string_tokenizer
evaluator: code_gen
language: cpp
difficulty: easy
source: general
tags: [strings, parsing]

prompt: |
  Write a C++ function `tokenize` that splits a string by a delimiter character
  and returns a vector of tokens.

  ```cpp
  std::vector<std::string> tokenize(const std::string& str, char delimiter);
  ```

test_harness: |
  #include <string>
  #include <vector>
  #include <iostream>
  #include <cassert>
  using namespace std;

  {{GENERATED_CODE}}

  int main() {
      auto r1 = tokenize("a,b,c", ',');
      assert(r1.size() == 3);
      assert(r1[0] == "a");
      assert(r1[2] == "c");

      auto r2 = tokenize("hello", ',');
      assert(r2.size() == 1);
      assert(r2[0] == "hello");

      auto r3 = tokenize("", ',');
      assert(r3.size() == 0);

      cout << "PASS" << endl;
      return 0;
  }

timeout_seconds: 15
