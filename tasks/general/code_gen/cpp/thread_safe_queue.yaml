id: cpp_thread_safe_queue
evaluator: code_gen
language: cpp
difficulty: hard
source: general
tags: [concurrency, threading, data-structures]

prompt: |
  Implement a thread-safe queue in C++ using std::mutex and std::condition_variable.
  It must support:
  - `void push(T item)` — add item, notify waiting threads
  - `T pop()` — block until item available, return and remove it
  - `bool empty() const` — return true if empty

  Use a class template: `template<typename T> class ThreadSafeQueue`.

test_harness: |
  #include <thread>
  #include <vector>
  #include <iostream>
  #include <cassert>
  #include <mutex>
  #include <condition_variable>
  #include <queue>
  using namespace std;

  {{GENERATED_CODE}}

  int main() {
      ThreadSafeQueue<int> q;
      assert(q.empty());

      vector<int> results;
      mutex mtx;

      thread producer([&]() {
          for (int i = 0; i < 5; i++) q.push(i);
      });

      thread consumer([&]() {
          for (int i = 0; i < 5; i++) {
              auto val = q.pop();
              lock_guard<mutex> lk(mtx);
              results.push_back(val);
          }
      });

      producer.join();
      consumer.join();

      assert(results.size() == 5);
      cout << "PASS" << endl;
      return 0;
  }

timeout_seconds: 20
