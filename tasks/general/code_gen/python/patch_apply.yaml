id: python_patch_apply
evaluator: code_gen
language: python
difficulty: hard
source: general
tags: [python, patching, parsing, text]

prompt: |
  Implement a function `apply_unified_patch(text: str, patch: str) -> str`.

  The patch format is simplified unified diff with one or more hunks:
  - Hunk headers look like `@@ -old_start,old_len +new_start,new_len @@`
  - Following lines in the hunk start with:
    - `' '` for context
    - `'-'` for deleted lines
    - `'+'` for inserted lines

  Requirements:
  - Apply all hunks in order
  - Preserve trailing newline behavior from the resulting joined lines
  - Raise `ValueError("context mismatch")` if context/deleted lines do not match the source text

function_signature: "def apply_unified_patch(text: str, patch: str) -> str:"

test_cases:
  - input: |
      text = "a\nb\nc\n"
      patch = "@@ -2,1 +2,1 @@\n-b\n+x\n"
      apply_unified_patch(text, patch)
    expected: "a\nx\nc\n"
  - input: |
      text = "alpha\nbeta\ngamma\n"
      patch = "@@ -1,2 +1,3 @@\n alpha\n beta\n+inserted\n"
      apply_unified_patch(text, patch)
    expected: "alpha\nbeta\ninserted\ngamma\n"
  - input: |
      text = "one\ntwo\nthree\nfour\n"
      patch = "@@ -2,2 +2,2 @@\n-two\n-three\n+TWO\n+THREE\n"
      apply_unified_patch(text, patch)
    expected: "one\nTWO\nTHREE\nfour\n"
  - input: |
      text = "keep\nsame\n"
      patch = "@@ -1,1 +1,1 @@\n-wrong\n+new\n"
      try:
          apply_unified_patch(text, patch)
          result = "ok"
      except ValueError as exc:
          result = str(exc)
      result
    expected: context mismatch

timeout_seconds: 15
